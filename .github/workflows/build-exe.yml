name: Build Panel Loop Next Level EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name PanelLoopNextLevel Panel_Loop_Next_Level_v2.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanelLoopNextLevel-Windows-EXE
          path: dist/PanelLoopNextLevel.exe
